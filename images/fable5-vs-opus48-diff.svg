<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowRedBack" markerWidth="10" markerHeight="10" refX="3" refY="5" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1200" height="980" fill="#ffffff"/>

  <!-- ===================== TITLE ===================== -->
  <text x="600" y="52" font-size="34" font-weight="bold" fill="#111827" text-anchor="middle">Fable 5 vs Opus 4.8 — what is the difference?</text>

  <!-- ===================== PANEL 1: MOUNTAIN ===================== -->
  <text x="80" y="110" font-size="22" font-weight="bold" fill="#111827">1. How hard a problem can it solve?</text>

  <!-- mountain -->
  <polygon points="150,440 450,140 750,440" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="450" y="468" font-size="15" fill="#64748b" text-anchor="middle">height = problem difficulty</text>

  <!-- Opus position -->
  <circle cx="330" cy="260" r="9" fill="#334155"/>
  <text x="312" y="252" font-size="17" font-weight="bold" fill="#334155" text-anchor="end">Opus 4.8</text>
  <text x="312" y="272" font-size="13" fill="#64748b" text-anchor="end">gets this high on its own</text>

  <!-- prompt boost along slope -->
  <line x1="338" y1="252" x2="382" y2="208" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <circle cx="390" cy="200" r="9" fill="#16a34a"/>
  <text x="285" y="185" font-size="15" font-weight="bold" fill="#16a34a" text-anchor="end">better prompts</text>
  <text x="285" y="204" font-size="15" font-weight="bold" fill="#16a34a" text-anchor="end">push it up a bit</text>
  <line x1="292" y1="196" x2="376" y2="198" stroke="#16a34a" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Fable summit flag -->
  <line x1="450" y1="140" x2="450" y2="98" stroke="#0f766e" stroke-width="3"/>
  <polygon points="450,98 486,107 450,116" fill="#0f766e"/>
  <text x="500" y="112" font-size="18" font-weight="bold" fill="#0f766e">Fable 5 reaches the top</text>

  <!-- level lines extended to the right -->
  <line x1="330" y1="260" x2="850" y2="260" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="390" y1="200" x2="850" y2="200" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="450" y1="140" x2="850" y2="140" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- green gap: closable -->
  <line x1="830" y1="255" x2="830" y2="205" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="862" y="238" font-size="16" font-weight="bold" fill="#16a34a">prompts close this gap</text>

  <!-- red gap: not closable -->
  <line x1="830" y1="195" x2="830" y2="145" stroke="#dc2626" stroke-width="4" marker-start="url(#arrowRedBack)" marker-end="url(#arrowRed)"/>
  <text x="862" y="165" font-size="16" font-weight="bold" fill="#dc2626">nothing closes this gap</text>
  <text x="862" y="185" font-size="13" fill="#dc2626">it is a bigger model</text>

  <!-- ===================== PANEL 2: OVERNIGHT RACE ===================== -->
  <text x="80" y="545" font-size="22" font-weight="bold" fill="#111827">2. Give it an all-night job</text>

  <!-- time axis -->
  <line x1="160" y1="585" x2="1030" y2="585" stroke="#e5e7eb" stroke-width="2"/>
  <text x="160" y="575" font-size="14" fill="#94a3b8">9 pm</text>
  <text x="590" y="575" font-size="14" fill="#94a3b8" text-anchor="middle">2 am</text>
  <text x="1020" y="575" font-size="14" fill="#94a3b8" text-anchor="end">6 am</text>
  <line x1="590" y1="580" x2="590" y2="700" stroke="#f3f4f6" stroke-width="2"/>

  <!-- Opus lane -->
  <text x="145" y="632" font-size="17" font-weight="bold" fill="#334155" text-anchor="end">Opus 4.8</text>
  <line x1="160" y1="626" x2="520" y2="626" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
  <g stroke="#dc2626" stroke-width="6" stroke-linecap="round">
    <line x1="538" y1="612" x2="566" y2="640"/>
    <line x1="566" y1="612" x2="538" y2="640"/>
  </g>
  <line x1="585" y1="626" x2="1030" y2="626" stroke="#d1d5db" stroke-width="3" stroke-dasharray="4 8"/>
  <text x="600" y="614" font-size="15" font-weight="bold" fill="#dc2626">gets lost along the way</text>

  <!-- Fable lane -->
  <text x="145" y="692" font-size="17" font-weight="bold" fill="#0f766e" text-anchor="end">Fable 5</text>
  <line x1="160" y1="686" x2="1000" y2="686" stroke="#0f766e" stroke-width="8" stroke-linecap="round"/>
  <line x1="1005" y1="686" x2="1005" y2="650" stroke="#0f766e" stroke-width="3"/>
  <polygon points="1005,650 1038,658 1005,666" fill="#0f766e"/>
  <text x="850" y="674" font-size="15" font-weight="bold" fill="#0f766e">still on track at dawn</text>

  <text x="160" y="730" font-size="13" fill="#64748b">Small mistakes snowball on long jobs. Staying on track for hours is what the bigger model buys you.</text>

  <!-- ===================== PANEL 3: PRICE + VERDICT ===================== -->
  <text x="80" y="795" font-size="22" font-weight="bold" fill="#111827">3. Price</text>

  <!-- Opus: 1 coin -->
  <text x="205" y="835" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Opus 4.8</text>
  <circle cx="205" cy="880" r="27" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="205" y="889" font-size="24" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>

  <!-- Fable: 2 coins -->
  <text x="430" y="835" font-size="16" font-weight="bold" fill="#0f766e" text-anchor="middle">Fable 5 = 2x</text>
  <circle cx="405" cy="880" r="27" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="405" y="889" font-size="24" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>
  <circle cx="458" cy="880" r="27" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="458" y="889" font-size="24" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>

  <!-- verdict box -->
  <rect x="620" y="815" width="500" height="110" fill="#eef2ff" stroke="#6366f1" stroke-width="2" rx="14"/>
  <text x="870" y="850" font-size="19" font-weight="bold" fill="#312e81" text-anchor="middle">Everyday work: Opus 4.8 is enough</text>
  <text x="870" y="890" font-size="19" font-weight="bold" fill="#0f766e" text-anchor="middle">Hardest + overnight jobs: Fable 5</text>

  <!-- footer -->
  <text x="600" y="962" font-size="12" fill="#9ca3af" text-anchor="middle">Internals (parameter count etc.) are not public. Based on the API surface and pricing, July 2026.</text>
</svg>
