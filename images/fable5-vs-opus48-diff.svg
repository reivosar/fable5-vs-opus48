<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrGray" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1200" height="1000" fill="#ffffff"/>

  <!-- ===================== TITLE ===================== -->
  <text x="600" y="48" font-size="32" font-weight="bold" fill="#111827" text-anchor="middle">Sonnet 5 vs Opus 4.8 vs Fable 5 — which one, when?</text>

  <!-- ===================== PANEL 1: MOUNTAIN ===================== -->
  <text x="80" y="100" font-size="21" font-weight="bold" fill="#111827">1. How hard a problem can it solve?</text>

  <polygon points="150,440 450,140 750,440" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="450" y="466" font-size="14" fill="#64748b" text-anchor="middle">height = problem difficulty</text>

  <!-- Sonnet 5 -->
  <circle cx="300" cy="290" r="9" fill="#2563eb"/>
  <text x="282" y="283" font-size="17" font-weight="bold" fill="#2563eb" text-anchor="end">Sonnet 5</text>
  <text x="282" y="302" font-size="12" fill="#64748b" text-anchor="end">the daily driver</text>

  <!-- Opus 4.8 -->
  <circle cx="366" cy="224" r="9" fill="#334155"/>
  <text x="348" y="217" font-size="17" font-weight="bold" fill="#334155" text-anchor="end">Opus 4.8</text>
  <text x="348" y="236" font-size="12" fill="#64748b" text-anchor="end">complex tasks</text>

  <!-- Fable 5 summit -->
  <line x1="450" y1="140" x2="450" y2="98" stroke="#0f766e" stroke-width="3"/>
  <polygon points="450,98 486,107 450,116" fill="#0f766e"/>
  <text x="500" y="112" font-size="18" font-weight="bold" fill="#0f766e">Fable 5 — the hardest problems</text>

  <!-- level lines -->
  <line x1="300" y1="290" x2="850" y2="290" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="366" y1="224" x2="850" y2="224" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="450" y1="140" x2="850" y2="140" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- step arrows -->
  <line x1="830" y1="285" x2="830" y2="232" stroke="#6b7280" stroke-width="3" marker-end="url(#arrGray)"/>
  <text x="862" y="252" font-size="14" font-weight="bold" fill="#374151">step up when Sonnet fails</text>
  <line x1="830" y1="219" x2="830" y2="148" stroke="#6b7280" stroke-width="3" marker-end="url(#arrGray)"/>
  <text x="862" y="178" font-size="14" font-weight="bold" fill="#374151">step up when Opus fails</text>

  <!-- ===================== PANEL 2: OVERNIGHT RACE ===================== -->
  <text x="80" y="525" font-size="21" font-weight="bold" fill="#111827">2. Give it an all-night job</text>

  <line x1="160" y1="565" x2="1030" y2="565" stroke="#e5e7eb" stroke-width="2"/>
  <text x="160" y="555" font-size="13" fill="#94a3b8">9 pm</text>
  <text x="590" y="555" font-size="13" fill="#94a3b8" text-anchor="middle">2 am</text>
  <text x="1020" y="555" font-size="13" fill="#94a3b8" text-anchor="end">6 am</text>

  <!-- Sonnet lane -->
  <text x="145" y="611" font-size="16" font-weight="bold" fill="#2563eb" text-anchor="end">Sonnet 5</text>
  <line x1="160" y1="605" x2="430" y2="605" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
  <g stroke="#dc2626" stroke-width="5" stroke-linecap="round">
    <line x1="446" y1="593" x2="470" y2="617"/>
    <line x1="470" y1="593" x2="446" y2="617"/>
  </g>
  <line x1="488" y1="605" x2="1030" y2="605" stroke="#e5e7eb" stroke-width="3" stroke-dasharray="4 8"/>
  <text x="500" y="598" font-size="14" font-weight="bold" fill="#dc2626">drifts first</text>

  <!-- Opus lane -->
  <text x="145" y="659" font-size="16" font-weight="bold" fill="#334155" text-anchor="end">Opus 4.8</text>
  <line x1="160" y1="653" x2="650" y2="653" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
  <g stroke="#dc2626" stroke-width="5" stroke-linecap="round">
    <line x1="666" y1="641" x2="690" y2="665"/>
    <line x1="690" y1="641" x2="666" y2="665"/>
  </g>
  <line x1="708" y1="653" x2="1030" y2="653" stroke="#e5e7eb" stroke-width="3" stroke-dasharray="4 8"/>
  <text x="720" y="646" font-size="14" font-weight="bold" fill="#dc2626">lasts longer</text>

  <!-- Fable lane -->
  <text x="145" y="707" font-size="16" font-weight="bold" fill="#0f766e" text-anchor="end">Fable 5</text>
  <line x1="160" y1="701" x2="1000" y2="701" stroke="#0f766e" stroke-width="7" stroke-linecap="round"/>
  <line x1="1005" y1="701" x2="1005" y2="667" stroke="#0f766e" stroke-width="3"/>
  <polygon points="1005,667 1036,675 1005,683" fill="#0f766e"/>
  <text x="830" y="693" font-size="14" font-weight="bold" fill="#0f766e">still on track at dawn</text>

  <text x="160" y="742" font-size="13" fill="#64748b">Small mistakes snowball on long jobs. The bigger the model, the longer they stay small.</text>

  <!-- ===================== PANEL 3: PRICE + VERDICT ===================== -->
  <text x="80" y="800" font-size="21" font-weight="bold" fill="#111827">3. Price</text>

  <!-- Sonnet: 1 coin -->
  <text x="195" y="843" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Sonnet 5</text>
  <circle cx="195" cy="885" r="24" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="195" y="893" font-size="20" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>
  <text x="195" y="932" font-size="12" fill="#64748b" text-anchor="middle">$3 / $15 per MTok</text>

  <!-- Opus: 2 coins -->
  <text x="420" y="843" font-size="15" font-weight="bold" fill="#334155" text-anchor="middle">Opus 4.8</text>
  <circle cx="396" cy="885" r="24" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="396" y="893" font-size="20" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>
  <circle cx="444" cy="885" r="24" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="444" y="893" font-size="20" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>
  <text x="420" y="932" font-size="12" fill="#64748b" text-anchor="middle">$5 / $25 per MTok</text>

  <!-- Fable: 4 coins -->
  <text x="712" y="843" font-size="15" font-weight="bold" fill="#0f766e" text-anchor="middle">Fable 5</text>
  <circle cx="640" cy="885" r="24" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="640" y="893" font-size="20" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>
  <circle cx="688" cy="885" r="24" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="688" y="893" font-size="20" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>
  <circle cx="736" cy="885" r="24" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="736" y="893" font-size="20" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>
  <circle cx="784" cy="885" r="24" fill="#fcd34d" stroke="#d97706" stroke-width="2.5"/>
  <text x="784" y="893" font-size="20" font-weight="bold" fill="#92400e" text-anchor="middle">$</text>
  <text x="712" y="932" font-size="12" fill="#64748b" text-anchor="middle">$10 / $50 per MTok</text>

  <!-- verdict box -->
  <rect x="870" y="830" width="270" height="110" fill="#eef2ff" stroke="#6366f1" stroke-width="2" rx="14"/>
  <text x="1005" y="868" font-size="19" font-weight="bold" fill="#312e81" text-anchor="middle">Start on Sonnet 5.</text>
  <text x="1005" y="900" font-size="16" font-weight="bold" fill="#0f766e" text-anchor="middle">Climb only when it fails.</text>

  <!-- footer -->
  <text x="600" y="978" font-size="12" fill="#9ca3af" text-anchor="middle">Each step up costs roughly 2x in practice. Internals are not public — based on API surface and pricing, July 2026.</text>
</svg>
