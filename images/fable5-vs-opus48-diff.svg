<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#dcfce7"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#16a34a" stroke-width="2"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="48" font-size="26" font-weight="bold" fill="#111827" text-anchor="middle">Fable 5 vs Opus 4.8</text>
  <text x="600" y="74" font-size="14" fill="#6b7280" text-anchor="middle">capability gap = closable behavior + non-closable compute</text>

  <!-- =============== LEFT: capability bars =============== -->
  <text x="80" y="122" font-size="15" font-weight="bold" fill="#374151">What prompting recovers</text>

  <!-- baseline -->
  <line x1="100" y1="600" x2="560" y2="600" stroke="#9ca3af" stroke-width="2"/>

  <!-- Opus raw capability bar -->
  <rect x="140" y="280" width="120" height="320" fill="#334155" rx="4"/>
  <!-- prompting extension (hatched) -->
  <rect x="140" y="190" width="120" height="90" fill="url(#hatch)" stroke="#16a34a" stroke-width="2" rx="4"/>

  <!-- Fable bar -->
  <rect x="360" y="120" width="120" height="480" fill="#0f766e" rx="4"/>

  <!-- bar labels -->
  <text x="200" y="628" font-size="15" font-weight="bold" fill="#334155" text-anchor="middle">Opus 4.8</text>
  <text x="420" y="628" font-size="15" font-weight="bold" fill="#0f766e" text-anchor="middle">Fable 5</text>

  <!-- guide lines -->
  <line x1="260" y1="280" x2="505" y2="280" stroke="#9ca3af" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="260" y1="190" x2="505" y2="190" stroke="#16a34a" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="480" y1="120" x2="505" y2="120" stroke="#0f766e" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- bracket: closable -->
  <path d="M510,280 L522,280 L522,190 L510,190" fill="none" stroke="#16a34a" stroke-width="2"/>
  <text x="530" y="228" font-size="13" font-weight="bold" fill="#16a34a">closable</text>
  <text x="530" y="245" font-size="11" fill="#16a34a">behavior</text>

  <!-- bracket: not closable -->
  <path d="M510,190 L522,190 L522,120 L510,120" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="530" y="150" font-size="13" font-weight="bold" fill="#dc2626">NOT</text>
  <text x="530" y="166" font-size="11" fill="#dc2626">weights</text>

  <!-- legend -->
  <g font-size="11" fill="#374151">
    <rect x="100" y="668" width="14" height="14" fill="#334155" rx="2"/>
    <text x="120" y="679">default behavior</text>
    <rect x="230" y="668" width="14" height="14" fill="url(#hatch)" stroke="#16a34a"/>
    <text x="250" y="679">+ prompt / settings</text>
    <rect x="390" y="668" width="14" height="14" fill="#0f766e" rx="2"/>
    <text x="410" y="679">Fable 5 default</text>
  </g>

  <!-- zone contents, kept to keywords -->
  <text x="100" y="712" font-size="11" fill="#166534">green: search-first · delegate · verify · autonomy · effort xhigh · adaptive thinking</text>
  <text x="100" y="734" font-size="11" fill="#991b1b">red: reasoning ceiling · overnight-run coherence</text>

  <!-- =============== RIGHT: error compounding =============== -->
  <text x="650" y="122" font-size="15" font-weight="bold" fill="#374151">Why the red zone dominates long runs</text>

  <rect x="650" y="140" width="470" height="280" fill="#fafafa" stroke="#e5e7eb"/>

  <!-- axes -->
  <text x="700" y="162" font-size="10" fill="#9ca3af">P(complete)</text>
  <line x1="690" y1="390" x2="1080" y2="390" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="390" x2="690" y2="170" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1075" y="408" font-size="10" fill="#9ca3af" text-anchor="end">steps in one autonomous run</text>

  <!-- p = 0.999 (Fable-like) -->
  <path d="M690,175 C 765 205, 825 235, 885 259 C 945 283, 1015 299, 1060 308"
        fill="none" stroke="#0f766e" stroke-width="3.5"/>
  <!-- p = 0.997 (Opus-like) -->
  <path d="M690,175 C 755 260, 820 315, 885 343 C 950 365, 1015 374, 1060 378"
        fill="none" stroke="#334155" stroke-width="3.5" stroke-dasharray="8 5"/>

  <text x="880" y="243" font-size="12" font-weight="bold" fill="#0f766e">99.9% / step</text>
  <text x="880" y="332" font-size="12" font-weight="bold" fill="#334155">99.7% / step</text>

  <!-- endpoint markers -->
  <circle cx="1060" cy="308" r="4" fill="#0f766e"/>
  <circle cx="1060" cy="378" r="4" fill="#334155"/>
  <text x="1070" y="304" font-size="12" font-weight="bold" fill="#0f766e">37%</text>
  <text x="1070" y="374" font-size="12" font-weight="bold" fill="#334155">5%</text>

  <text x="650" y="444" font-size="11" fill="#6b7280">tiny per-step edge, compounded = finishes overnight vs drifts (illustrative)</text>

  <!-- =============== BOTTOM RIGHT: fact chips =============== -->
  <rect x="650" y="480" width="225" height="90" fill="#f8fafc" stroke="#d1d5db" rx="10"/>
  <text x="762" y="518" font-size="22" font-weight="bold" fill="#111827" text-anchor="middle">2x</text>
  <text x="762" y="546" font-size="12" fill="#6b7280" text-anchor="middle">price per token</text>

  <rect x="895" y="480" width="225" height="90" fill="#f8fafc" stroke="#d1d5db" rx="10"/>
  <text x="1007" y="512" font-size="15" font-weight="bold" fill="#111827" text-anchor="middle">thinking</text>
  <text x="1007" y="534" font-size="12" fill="#334155" text-anchor="middle">Opus: optional</text>
  <text x="1007" y="552" font-size="12" fill="#0f766e" text-anchor="middle">Fable: always on</text>

  <rect x="650" y="590" width="225" height="90" fill="#f8fafc" stroke="#d1d5db" rx="10"/>
  <text x="762" y="622" font-size="15" font-weight="bold" fill="#111827" text-anchor="middle">same limits</text>
  <text x="762" y="644" font-size="12" fill="#6b7280" text-anchor="middle">1M ctx · 128K out</text>
  <text x="762" y="662" font-size="12" fill="#6b7280" text-anchor="middle">same tokenizer</text>

  <rect x="895" y="590" width="225" height="90" fill="#f8fafc" stroke="#d1d5db" rx="10"/>
  <text x="1007" y="622" font-size="15" font-weight="bold" fill="#111827" text-anchor="middle">turn length</text>
  <text x="1007" y="644" font-size="12" fill="#334155" text-anchor="middle">Opus: sec - min</text>
  <text x="1007" y="662" font-size="12" fill="#0f766e" text-anchor="middle">Fable: minutes+</text>

  <!-- footer -->
  <text x="600" y="764" font-size="10" fill="#9ca3af" text-anchor="middle">params / architecture not public - based on API surface and pricing, 2026-07</text>
</svg>
